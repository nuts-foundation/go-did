version: 2
updates:
  # github actions
  - package-ecosystem: "github-actions"
    # checks workflow files in /.github/workflows
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Go
  - package-ecosystem: "gomod"
    # checks /go.mod
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-modules:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
